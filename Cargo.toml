[workspace]
resolver = "2"
members = ["crates/atmoq"]

[workspace.package]
version = "0.0.1"
edition = "2021"
license = "MIT"
repository = "https://github.com/streamplace/atmoq"

[workspace.dependencies]
anyhow = "1"
base64 = "0.22"
# Cloudflare's production relay speaks draft-07 only (see docs/diag); these
# maintenance-branch crates match it. Drop when CF deploys draft-14.
moq-transport-07 = { package = "moq-transport", git = "https://github.com/cloudflare/moq-rs", rev = "ebc843de8504e37d36c3134a1181513ebdf7a34a" }
moq-native-07 = { package = "moq-native-ietf", git = "https://github.com/cloudflare/moq-rs", rev = "ebc843de8504e37d36c3134a1181513ebdf7a34a" }
ciborium = "0.2"
clap = { version = "4", features = ["derive"] }
futures-util = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
tokio-tungstenite = { version = "0.24", features = ["rustls-tls-webpki-roots"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
url = "2"
