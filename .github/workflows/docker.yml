name: docker

# Builds the atmoq image and pushes it to GitHub's container registry (GHCR).
# Release-versioned tags (:X.Y.Z, :latest) are handled by the release-plz
# workflow; this one publishes the moving development tags from main and does a
# build-only sanity check on every PR. (No paths filter: the image breaks on
# Cargo/vendor/source changes, not just Dockerfile edits — a path-filtered run
# once let a vendored-dep break slip through.)

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE: ghcr.io/${{ github.repository }}

jobs:
  build:
    name: build + push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      # Tags: `main` + `edge` + `sha-<short>` on the default branch.
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=ref,event=branch
            type=raw,value=edge,enable={{is_default_branch}}
            type=sha,prefix=sha-

      # Don't push from PRs (no write token on forks; build-only is the check).
      - if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          # The Rust workspace (and Dockerfile) live in rust/ after the
          # monorepo move; the image only needs Cargo.toml/Cargo.lock/crates/vendor.
          context: rust
          file: rust/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Share layer cache across runs via the Actions cache backend.
          cache-from: type=gha
          cache-to: type=gha,mode=max
