name: pages

# Publishes the relay-conformance report to GitHub Pages.
#
# The report is a single self-contained HTML file committed at
# tests/relay-conformance/relay-conformance.html (generated by report.mjs from
# the results/*.jsonl, which aren't tracked — so we publish the committed HTML
# rather than rebuilding it here). We stage it as index.html so the site root
# serves the report: https://streamplace.github.io/atmoq/
#
# One-time setup: repo Settings -> Pages -> Build and deployment -> Source =
# "GitHub Actions". After that this deploys on every push to main that touches
# the report (or on manual dispatch).

on:
  push:
    branches: [main]
    paths:
      - tests/relay-conformance/relay-conformance.html
      - .github/workflows/pages.yml
  workflow_dispatch:

# Pages needs pages:write + id-token:write; contents:read to check out.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deploy at a time; let an in-flight run finish (don't cancel a
# deploy midway).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    name: build + deploy
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Stage report as index.html
        run: |
          mkdir -p _site
          cp tests/relay-conformance/relay-conformance.html _site/index.html

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
