name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to a branch cancels the in-flight run for that branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
      # Git deps (cloudflare/moq-rs) compile with cap-lints, so `-D warnings`
      # only fails on lints in our own crates.
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # Plain `cargo test` covers unit, integration, and doctests.
      - run: cargo test --workspace --locked

  build:
    name: build release (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          # Keep the Windows cross-build green between releases; the release
          # workflow builds the same target for the published binaries.
          - target: x86_64-pc-windows-gnu
            packages: gcc-mingw-w64-x86-64-posix binutils-mingw-w64-x86-64
    steps:
      - uses: actions/checkout@v4
      - if: matrix.packages
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - run: cargo build --workspace --release --locked --bins --target ${{ matrix.target }}
