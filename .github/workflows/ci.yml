name: CI

on:
  push:
    branches: [main]
  pull_request:

# A new push to a branch cancels the in-flight run for that branch.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # --- Rust (rust/) --------------------------------------------------------
  rust-fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --manifest-path rust/Cargo.toml --check

  rust-clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      # Git deps (cloudflare/moq-rs) compile with cap-lints, so `-D warnings`
      # only fails on lints in our own crates.
      - run: cargo clippy --all --manifest-path rust/Cargo.toml --all-targets --locked -- -D warnings

  rust-test:
    name: rust test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      # Plain `cargo test` covers unit, integration, and doctests.
      - run: cargo test --manifest-path rust/Cargo.toml --workspace --locked

  rust-build:
    name: rust build (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
          # Keep the Windows cross-build green between releases; the release
          # workflow builds the same target for the published binaries.
          - target: x86_64-pc-windows-gnu
            packages: gcc-mingw-w64-x86-64-posix binutils-mingw-w64-x86-64
    steps:
      - uses: actions/checkout@v4
      - if: matrix.packages
        run: sudo apt-get update && sudo apt-get install -y ${{ matrix.packages }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: ${{ matrix.target }}
      - run: cargo build --manifest-path rust/Cargo.toml --workspace --release --locked --bins --target ${{ matrix.target }}

  # --- Go (go/) ------------------------------------------------------------
  go-fmt:
    name: gofmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - name: gofmt -l
        working-directory: go
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

  go-vet:
    name: go vet
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - working-directory: go
        run: go vet ./...

  go-tidy:
    name: go mod tidy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      # go.mod/go.sum must already be tidy — fail if `go mod tidy` would change them.
      - working-directory: go
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

  go-test:
    name: go build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go/go.mod
      - working-directory: go
        run: |
          go build ./...
          go test -race ./...

  # --- TypeScript (ts/) ----------------------------------------------------
  ts-check:
    name: tsc --noEmit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ts/.nvmrc
          cache: npm
          cache-dependency-path: ts/package-lock.json
      - working-directory: ts
        run: |
          npm ci
          npx tsc --noEmit

  ts-test:
    name: vitest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: ts/.nvmrc
          cache: npm
          cache-dependency-path: ts/package-lock.json
      - working-directory: ts
        run: |
          npm ci
          npx vitest run
