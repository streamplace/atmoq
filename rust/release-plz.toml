# release-plz: version bumping, changelog, git tags, and GitHub releases.
# https://release-plz.dev
#
# atmoq's patched moq-net (vendor/moq-net) and its companion moq-native
# republish (vendor/moq-native) are published to crates.io as atmoq-moq-net /
# atmoq-moq-native, so atmoq itself is publishable again: its manifest uses
# path+version deps, and cargo strips the paths at publish time. release-plz
# owns the version, CHANGELOG.md, the git tag, the GitHub release, and the
# crates.io publish; the release workflow's build job attaches prebuilt
# binaries to that release.
#
# The vendor crates are workspace-EXCLUDED, so release-plz never touches them.
# When a vendored patch changes: manually bump that fork's version, `cargo
# publish` it from its directory, and bump the pinned version in
# crates/atmoq/Cargo.toml. (This whole arrangement dies when the patches land
# upstream — see vendor/moq-net/UPSTREAM.md.)

# Monorepo: the Rust client lives in rust/. To keep its release cadence
# independent of the Go client (go/, which tags go/vX.Y.Z), release-plz cuts
# `rust-vX.Y.Z` tags. The release workflow points release-plz at rust/Cargo.toml
# via its manifest_path input; this config sits next to that manifest.

[workspace]
# Publish atmoq to crates.io on release (deps resolve to the atmoq-moq-* forks).
publish = true
# Still cut a git tag and a GitHub release for every version bump.
git_tag_enable = true
git_release_enable = true
# Tag as `rust-v0.1.0` to avoid collision with the Go client's `go/vX.Y.Z` tags.
git_tag_name = "rust-v{{ version }}"
git_release_name = "rust-v{{ version }}"
# Keep CHANGELOG.md generated from conventional commits.
changelog_update = true
# Pre-1.0: keep breaking changes bumping the patch/minor as usual rather than
# forcing 1.0; flip this on once the wire format stabilizes.
# release_always = true
