[package]
edition = "2024"
rust-version = "1.85"
# UNMODIFIED moq-native 0.17.0, republished under a fork name for one reason
# only: its moq-net dependency must resolve to atmoq-moq-net (our patched
# fork, see ../moq-net/UPSTREAM.md) so that moq-net types are identical across
# the moq-native API boundary. Zero source changes — diff `src/` against the
# moq-native 0.17.0 crate to verify. The lib name stays `moq_native`;
# consumers use dependency renaming:
#   moq-native = { package = "atmoq-moq-native", version = "..." }
name = "atmoq-moq-native"
version = "0.17.0"
authors = ["Luke Curley", "Eli Mallon <eli@aquareum.tv>"]
build = false
autolib = false
autobins = false
autoexamples = false
autotests = false
autobenches = false
description = "TEMPORARY unmodified republish of moq-native 0.17.0 against atmoq-moq-net, pending upstreaming. Use moq-native unless you are atmoq."
readme = "README.md"
keywords = [
    "quic",
    "http3",
    "webtransport",
    "media",
    "live",
]
categories = [
    "multimedia",
    "network-programming",
    "web-programming",
]
license = "MIT OR Apache-2.0"
repository = "https://github.com/streamplace/atmoq"
resolver = "2"

[features]
android-logcat = ["dep:tracing-android"]
aws-lc-rs = [
    "rustls/aws-lc-rs",
    "rcgen?/aws_lc_rs",
    "quinn?/rustls-aws-lc-rs",
]
default = [
    "quinn",
    "aws-lc-rs",
    "websocket",
]
iroh = [
    "dep:web-transport-iroh",
    "dep:web-transport-proto",
]
jemalloc = [
    "dep:tikv-jemallocator",
    "dep:tikv-jemalloc-ctl",
]
noq = [
    "dep:web-transport-noq",
    "dep:rcgen",
    "dep:reqwest",
    "dep:rustls-webpki",
    "dep:notify",
]
quiche = [
    "dep:web-transport-quiche",
    "dep:rcgen",
]
quinn = [
    "dep:quinn",
    "dep:web-transport-quinn",
    "dep:rcgen",
    "dep:reqwest",
    "dep:rustls-webpki",
    "dep:notify",
]
ring = [
    "rustls/ring",
    "rcgen?/ring",
    "quinn?/rustls-ring",
]
tokio-console = ["dep:console-subscriber"]
websocket = ["dep:qmux"]

[lib]
name = "moq_native"
path = "src/lib.rs"
doctest = false

[[example]]
name = "chat"
path = "examples/chat.rs"

[[example]]
name = "clock"
path = "examples/clock.rs"

[[test]]
name = "alpn"
path = "tests/alpn.rs"

[[test]]
name = "backend"
path = "tests/backend.rs"

[[test]]
name = "broadcast"
path = "tests/broadcast.rs"

[dependencies.clap]
version = "4"
features = [
    "derive",
    "env",
]

