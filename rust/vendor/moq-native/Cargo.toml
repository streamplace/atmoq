version = "0.5"
optional = true

[dependencies.futures]
version = "0.3"

[dependencies.hex]
version = "0.4"

[dependencies.humantime]
version = "2.3"

[dependencies.humantime-serde]
version = "1.1"

# The one real change vs upstream moq-native 0.17.0: moq-net resolves to the
